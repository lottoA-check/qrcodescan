<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai Lottery QR Scanner</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles to make the html5-qrcode scanner look more modern */
        #reader { border: none !important; border-radius: 0.75rem; overflow: hidden; background: #f3f4f6; }
        #reader button { background-color: #3b82f6; color: white; padding: 0.5rem 1rem; border-radius: 0.375rem; border: none; cursor: pointer; margin: 0.25rem; font-weight: 500;}
        #reader button:hover { background-color: #2563eb; }
        #reader a { display: none; } /* Hide the default powered by link */
        #reader__dashboard_section_csr span { font-family: ui-sans-serif, system-ui, sans-serif; margin-bottom: 10px; display: block; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans text-gray-800">

    <script>
        // =========================================================================
        // IMPORTANT: REPLACE THIS URL WITH YOUR GOOGLE APPS SCRIPT WEB APP URL!
        // =========================================================================
        const GAS_URL = "https://script.google.com/macros/s/AKfycbz2k0JXLpN8DkrcIwCSIpUZGKzrjsRCNTkRCzoEKiAyRJKhu-R7Ts_IU34Hv27Pl0BJ/exec"; 
        // Example: "https://script.google.com/macros/s/AKfycb.../exec"
    </script>

    <div class="max-w-xl mx-auto p-4 py-8">
        <!-- Header -->
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-blue-700 mb-2">Lottery Scanner</h1>
            <p class="text-sm text-gray-500">Scan QR or upload image to save to Google Sheets</p>
        </div>

        <!-- Scanner Card -->
        <div class="bg-white rounded-2xl shadow-lg p-4 mb-6">
            <div id="reader" class="w-full"></div>
        </div>

        <!-- Scan Results -->
        <div class="bg-white rounded-2xl shadow-lg p-4">
            <h2 class="text-lg font-semibold border-b pb-2 mb-3">Recent Scans</h2>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm" id="resultsTable">
                    <thead>
                        <tr class="text-gray-500">
                            <th class="pb-2 font-medium">QR Data</th>
                            <th class="pb-2 font-medium text-right">Status</th>
                        </tr>
                    </thead>
                    <tbody id="scanList" class="divide-y divide-gray-100">
                        <!-- Scanned items will appear here -->
                    </tbody>
                </table>
                <div id="emptyState" class="text-center text-gray-400 py-4 italic">
                    No tickets scanned yet.
                </div>
            </div>
        </div>
    </div>

    <script>
        const scanList = document.getElementById('scanList');
        const emptyState = document.getElementById('emptyState');
        const scannedCodes = new Set(); // Prevent duplicate rapid scans
        let lastScanTime = 0;

        // Audio Beep for successful scan feedback
        function playBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                osc.connect(gainNode);
                gainNode.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1000, ctx.currentTime);
                gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
                osc.start();
                osc.stop(ctx.currentTime + 0.1);
            } catch(e) { console.log("Audio not supported"); }
        }

        async function saveToGoogleSheets(qrData, rowId) {
            const statusElement = document.getElementById(`status-${rowId}`);
            
            if(GAS_URL === "YOUR_WEB_APP_URL_HERE") {
                statusElement.innerHTML = '<span class="text-orange-500 font-medium">Setup Needed</span>';
                alert("Please add your Google Apps Script Web App URL in the index.html file.");
                return;
            }

            try {
                // Using GET request to avoid complex CORS preflight issues
                const response = await fetch(`${GAS_URL}?qrData=${encodeURIComponent(qrData)}`);
                const result = await response.json();

                if (result.status === 'success') {
                    statusElement.innerHTML = '<span class="text-green-500 font-medium">Saved ✓</span>';
                } else {
                    statusElement.innerHTML = `<span class="text-red-500 font-medium">Error</span>`;
                    console.error("Sheet Error:", result.message);
                }
            } catch (error) {
                statusElement.innerHTML = '<span class="text-red-500 font-medium">Failed</span>';
                console.error("Fetch Error:", error);
            }
        }

        function onScanSuccess(decodedText, decodedResult) {
            const now = Date.now();
            
            // Prevent duplicate scans within 3 seconds
            if (scannedCodes.has(decodedText) && (now - lastScanTime) < 3000) {
                return;
            }

            // Acknowledge new scan
            playBeep();
            scannedCodes.add(decodedText);
            lastScanTime = now;
            emptyState.style.display = 'none';

            // Generate unique ID for this row
            const rowId = Math.random().toString(36).substr(2, 9);

            // Add to UI Table immediately
            const newRow = document.createElement('tr');
            newRow.innerHTML = `
                <td class="py-3 font-mono text-xs md:text-sm text-blue-900 break-all pr-2">${decodedText}</td>
                <td class="py-3 text-right" id="status-${rowId}">
                    <span class="text-gray-400 animate-pulse text-xs">Saving...</span>
                </td>
            `;
            
            // Insert at top of list
            if (scanList.firstChild) {
                scanList.insertBefore(newRow, scanList.firstChild);
            } else {
                scanList.appendChild(newRow);
            }

            // Fire and forget save to Google Sheets
            saveToGoogleSheets(decodedText, rowId);
        }

        function onScanFailure(error) {
            // html5-qrcode logs failures constantly while searching for a code. 
            // We safely ignore this to keep the console clean.
        }

        // Initialize Scanner
        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader",
            { 
                fps: 10, 
                qrbox: {width: 250, height: 250},
                rememberLastUsedCamera: true,
                supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA, Html5QrcodeScanType.SCAN_TYPE_FILE]
            },
            /* verbose= */ false
        );
        
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    </script>
</body>
</html>
