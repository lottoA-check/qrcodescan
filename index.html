<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai Lottery QR Scanner</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles to make the html5-qrcode scanner look more modern */
        #reader { border: none !important; border-radius: 0.75rem; overflow: hidden; background: #f3f4f6; }
        #reader button { background-color: #3b82f6; color: white; padding: 0.5rem 1rem; border-radius: 0.375rem; border: none; cursor: pointer; margin: 0.25rem; font-weight: 500;}
        #reader button:hover { background-color: #2563eb; }
        #reader a { display: none; } /* Hide the default powered by link */
        #reader__dashboard_section_csr span { font-family: ui-sans-serif, system-ui, sans-serif; margin-bottom: 10px; display: block; }
        
        /* Alert Animation */
        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .alert-anim { animation: slideDown 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans text-gray-800 relative">

    <script>
        // =========================================================================
        // IMPORTANT: REPLACE THIS URL WITH YOUR GOOGLE APPS SCRIPT WEB APP URL!
        // =========================================================================
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzLsTSgaMeaJYixfrwRFyTiz1Rw-ae3z6WNgRsH3uwEWnGg_djMJFftqnWKUpxq8M4Q/exec"; 
        // Example: "https://script.google.com/macros/s/AKfycb.../exec"
    </script>

    <!-- Floating Alert Container -->
    <div id="alertContainer" class="fixed top-4 left-0 right-0 z-50 flex justify-center hidden">
        <div class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 rounded shadow-md alert-anim flex items-center max-w-md mx-4">
            <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            <div>
                <p class="font-bold" id="alertTitle">Duplicate Scan</p>
                <p class="text-sm" id="alertMessage">You have already scanned this ticket.</p>
            </div>
        </div>
    </div>

    <!-- NEW: Top Right Controls (Hidden by default) -->
    <div class="fixed top-4 right-4 z-40 flex flex-col items-end">
        <!-- Toggle Button -->
        <button id="togglePanelBtn" class="bg-white p-3 rounded-full shadow-lg text-gray-600 hover:text-blue-600 hover:bg-blue-50 transition-all border border-gray-200" title="USB Scanner & Settings">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
        </button>

        <!-- Hidden Panel -->
        <div id="usbPanel" class="hidden mt-3 w-[calc(100vw-2rem)] max-w-sm bg-white rounded-2xl shadow-2xl border border-gray-200 p-5 transform transition-all origin-top-right">
            <div class="flex justify-between items-center mb-4 pb-2 border-b">
                <h2 class="text-sm font-bold text-gray-800">USB Scanner & Extra Data</h2>
                <button id="closePanelBtn" class="text-gray-400 hover:text-red-500 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">Column D Name</label>
                        <input type="text" id="inputColD" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="Enter name...">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">Column E Name</label>
                        <input type="text" id="inputColE" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="Enter name...">
                    </div>
                </div>
                
                <div class="bg-blue-50 p-3 rounded-lg border border-blue-100">
                    <label class="block text-xs font-bold text-blue-800 mb-2">USB Scanner Input</label>
                    <div class="flex shadow-sm">
                        <input type="text" id="usbInput" class="w-full border border-gray-300 rounded-l-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Scan here...">
                        <button id="manualSubmitBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-3 text-sm rounded-r-lg font-medium transition-colors">Submit</button>
                    </div>
                    <p class="text-[10px] text-blue-600 mt-2 leading-tight">Click inside this box before using your physical USB scanner.</p>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-xl mx-auto p-4 py-8 mt-4 md:mt-0">
        <!-- Header -->
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-blue-700 mb-2">Lottery Scanner</h1>
            <p class="text-sm text-gray-500">Scan QR or upload image to save to Google Sheets</p>
        </div>

        <!-- Scanner Card -->
        <div class="bg-white rounded-2xl shadow-lg p-4 mb-6 relative">
             <!-- Scanning Overlay -->
             <div id="pauseOverlay" class="absolute inset-0 bg-white/80 z-10 flex flex-col items-center justify-center rounded-2xl hidden backdrop-blur-sm">
                <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-3"></div>
                <p class="text-blue-800 font-semibold">Processing...</p>
            </div>
            <div id="reader" class="w-full"></div>
        </div>

        <!-- Scan Results -->
        <div class="bg-white rounded-2xl shadow-lg p-4">
            <div class="flex justify-between items-center border-b pb-2 mb-3">
                <h2 class="text-lg font-semibold">Recent Scans</h2>
                <span id="scanCount" class="text-sm bg-blue-100 text-blue-800 py-1 px-2 rounded-full font-medium">0</span>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm" id="resultsTable">
                    <thead>
                        <tr class="text-gray-500">
                            <th class="pb-2 font-medium">QR Data</th>
                            <th class="pb-2 font-medium text-right">Status</th>
                        </tr>
                    </thead>
                    <tbody id="scanList" class="divide-y divide-gray-100">
                        <!-- Scanned items will appear here -->
                    </tbody>
                </table>
                <div id="emptyState" class="text-center text-gray-400 py-4 italic">
                    No tickets scanned yet.
                </div>
            </div>
        </div>
    </div>

    <script>
        const scanList = document.getElementById('scanList');
        const emptyState = document.getElementById('emptyState');
        const alertContainer = document.getElementById('alertContainer');
        const alertTitle = document.getElementById('alertTitle');
        const alertMessage = document.getElementById('alertMessage');
        const pauseOverlay = document.getElementById('pauseOverlay');
        const scanCountEl = document.getElementById('scanCount');
        const usbInput = document.getElementById('usbInput');
        const manualSubmitBtn = document.getElementById('manualSubmitBtn');
        
        // New Panel Toggles
        const togglePanelBtn = document.getElementById('togglePanelBtn');
        const closePanelBtn = document.getElementById('closePanelBtn');
        const usbPanel = document.getElementById('usbPanel');
        
        togglePanelBtn.addEventListener('click', () => {
            usbPanel.classList.toggle('hidden');
            // Automatically focus the USB input box when you open the panel
            if(!usbPanel.classList.contains('hidden')) {
                usbInput.focus();
            }
        });
        
        closePanelBtn.addEventListener('click', () => {
            usbPanel.classList.add('hidden');
        });
        
        const scannedCodes = new Set(); 
        let html5QrcodeScanner;

        // Audio Beeps
        function playBeep(type = 'success') {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                osc.connect(gainNode);
                gainNode.connect(ctx.destination);
                
                if (type === 'error') {
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(300, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.3);
                } else {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(1000, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.1);
                }
                
                gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + (type === 'error' ? 0.3 : 0.1));
                osc.start();
                osc.stop(ctx.currentTime + (type === 'error' ? 0.3 : 0.1));
            } catch(e) { console.log("Audio not supported"); }
        }

        function showAlert() {
            alertContainer.classList.remove('hidden');
            playBeep('error');
            setTimeout(() => {
                alertContainer.classList.add('hidden');
            }, 3000);
        }

        async function saveToGoogleSheets(qrData, rowId) {
            const statusElement = document.getElementById(`status-${rowId}`);
            
            // Get values from the input boxes
            const colDValue = document.getElementById('inputColD').value;
            const colEValue = document.getElementById('inputColE').value;
            
            if(GAS_URL === "YOUR_WEB_APP_URL_HERE") {
                statusElement.innerHTML = '<span class="text-orange-500 font-medium">Setup Needed</span>';
                return;
            }

            try {
                // Add colD and colE to the URL so the script can catch them
                const url = `${GAS_URL}?qrData=${encodeURIComponent(qrData)}&colD=${encodeURIComponent(colDValue)}&colE=${encodeURIComponent(colEValue)}`;
                const response = await fetch(url);
                const result = await response.json();

                if (result.status === 'success') {
                    statusElement.innerHTML = '<span class="text-green-500 font-medium">Saved ✓</span>';
                } else if (result.status === 'duplicate') {
                    // This happens if Google Sheets says it already exists!
                    statusElement.innerHTML = `<span class="text-red-600 font-bold">Already Scanned!</span>`;
                    showAlert(); // Show the big red banner
                } else {
                    statusElement.innerHTML = `<span class="text-red-500 font-medium">Error</span>`;
                }
            } catch (error) {
                statusElement.innerHTML = '<span class="text-red-500 font-medium">Failed</span>';
            }
        }

        function onScanSuccess(decodedText, decodedResult) {
            // 1. Check for Duplicates
            if (scannedCodes.has(decodedText)) {
                // If it's a file upload, scanner automatically pauses. If camera, it keeps going.
                // We show an alert so they know they scanned it already.
                showAlert();
                
                // Briefly pause the scanner so it doesn't spam the error sound
                if(html5QrcodeScanner && html5QrcodeScanner.getState() === 2 /* SCANNING */) {
                    html5QrcodeScanner.pause();
                    setTimeout(() => { html5QrcodeScanner.resume(); }, 2000);
                }
                return;
            }

            // 2. New Scan! Pause scanner and show overlay
            playBeep('success');
            if(html5QrcodeScanner && html5QrcodeScanner.getState() === 2) {
                html5QrcodeScanner.pause();
            }
            pauseOverlay.classList.remove('hidden');
            
            // 3. Add to tracking
            scannedCodes.add(decodedText);
            scanCountEl.innerText = scannedCodes.size;
            emptyState.style.display = 'none';

            // 4. Generate unique ID and add to UI
            const rowId = Math.random().toString(36).substr(2, 9);
            const newRow = document.createElement('tr');
            newRow.classList.add('bg-green-50', 'transition-colors', 'duration-500'); // Highlight new row
            newRow.innerHTML = `
                <td class="py-3 font-mono text-xs md:text-sm text-blue-900 break-all pr-2 pl-2">${decodedText}</td>
                <td class="py-3 text-right pr-2" id="status-${rowId}">
                    <span class="text-gray-400 animate-pulse text-xs">Saving...</span>
                </td>
            `;
            
            if (scanList.firstChild) {
                scanList.insertBefore(newRow, scanList.firstChild);
            } else {
                scanList.appendChild(newRow);
            }

            // Remove highlight after a moment
            setTimeout(() => { newRow.classList.remove('bg-green-50'); }, 1500);

            // 5. Fire save to Google Sheets
            saveToGoogleSheets(decodedText, rowId);

            // 6. Resume scanning after a brief delay
            setTimeout(() => {
                pauseOverlay.classList.add('hidden');
                if(html5QrcodeScanner && html5QrcodeScanner.getState() === 3 /* PAUSED */) {
                    html5QrcodeScanner.resume();
                }
            }, 1500); // 1.5 second pause between scans
        }

        function onScanFailure(error) {
            // Ignore continuous failures
        }

        // ==========================================
        // NEW: Handle Physical USB Scanner Input
        // ==========================================
        function processUSBScan() {
            const scannedText = usbInput.value.trim();
            
            if (scannedText === "") return; // Don't submit empty strings

            // Call the same success function the camera uses
            onScanSuccess(scannedText, null);
            
            // Clear the input box so it is ready for the next scan
            usbInput.value = "";
            // Keep focus on the input box so you can scan rapidly
            usbInput.focus();
        }

        // USB Scanners automatically press "Enter" when they finish reading a code.
        usbInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault(); // Stop page from refreshing
                processUSBScan();
            }
        });

        // Allow clicking the submit button for manual typing
        manualSubmitBtn.addEventListener('click', processUSBScan);

        // Keep focus on the USB input box when clicking anywhere else on the background
        // (Helps prevent missing scans if you accidentally click away)
        document.addEventListener('click', (e) => {
             // Don't steal focus if user is typing in Column D or E
            if(e.target.id !== 'inputColD' && e.target.id !== 'inputColE' && e.target.tagName !== 'BUTTON' && e.target.tagName !== 'A') {
                // Uncomment the line below if you want aggressive refocusing on the USB input
                // usbInput.focus(); 
            }
        });


        // Initialize Scanner
        html5QrcodeScanner = new Html5QrcodeScanner(
            "reader",
            { 
                fps: 30, // Increased from 10 to 30 for much faster frame processing
                qrbox: {width: 250, height: 250},
                rememberLastUsedCamera: true,
                supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA, Html5QrcodeScanType.SCAN_TYPE_FILE],
                formatsToSupport: [ 
                    Html5QrcodeSupportedFormats.QR_CODE,
                    Html5QrcodeSupportedFormats.DATA_MATRIX // Added DATA_MATRIX for Thai Lottery tickets!
                ] 
            },
            false
        );
        
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    </script>
</body>
</html>
